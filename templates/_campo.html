<div>
  <label for="{{ campo.id_for_label }}" class="mb-1 block text-sm font-medium text-cacau">
    {{ campo.label }}
  </label>
  {{ campo }}
  {% if campo.help_text %}
    <div class="mt-1 text-xs text-ferrugem/80">{{ campo.help_text|safe }}</div>
  {% endif %}
  {% for erro in campo.errors %}
    <p class="mt-1 text-sm font-medium text-red-700">{{ erro }}</p>
  {% endfor %}
</div>
